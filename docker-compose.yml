version: '3.8'

services:
  # FastAPI Backend with XGBoost
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: loanguard-backend
    ports:
      - "8000:8000"
    environment:
      - MONGO_URL=${MONGO_URL:-mongodb://localhost:27017}
      - DB_NAME=${DB_NAME:-homecredit_db}
      - SECRET_KEY=${SECRET_KEY:-your-super-secret-key-change-in-production}
    volumes:
      - ./backend:/app  # For development hot-reload
    depends_on:
      - mongodb
    networks:
      - loanguard-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # React Frontend with Nginx
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: loanguard-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - loanguard-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/index.html"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # MongoDB (local development - use Atlas in production)
  mongodb:
    image: mongo:7.0-alpine
    container_name: loanguard-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: homecredit_db
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - loanguard-network
    restart: unless-stopped
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  loanguard-network:
    driver: bridge

volumes:
  mongodb_data:
  mongodb_config:
