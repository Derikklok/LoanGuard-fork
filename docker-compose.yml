services:
  # FastAPI Backend with XGBoost
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: loanguard-backend
    ports:
      - "8000:8000"
    environment:
      # MongoDB - use local for dev, Atlas for production
      - MONGO_URL=${MONGO_URL:-mongodb://admin:password@mongodb:27017/homecredit_db?authSource=admin}
      - DB_NAME=${DB_NAME:-homecredit_db}
      - SECRET_KEY=${SECRET_KEY:-your-super-secret-key-change-in-production}
      # Python environment
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
    volumes:
      # Mount only source files for hot-reload, preserve venv
      - ./backend/routes:/app/routes
      - ./backend/notebooks:/app/notebooks
      - ./backend/main.py:/app/main.py
      - ./backend/schemas.py:/app/schemas.py
      - ./backend/database.py:/app/database.py
      # Persist model cache if needed
      - backend_cache:/.cache
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - loanguard-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # React Frontend with Nginx
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: loanguard-frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - loanguard-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/index.html"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # MongoDB - Local development (use Atlas for production)
  mongodb:
    image: mongo:latest
    container_name: loanguard-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: homecredit_db
    volumes:
      # Persistent data storage
      - mongodb_data:/data/db
      # Persistent config storage
      - mongodb_config:/data/configdb
      # Optional: Initialize with seed script
      # - ./scripts/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js
    networks:
      - loanguard-network
    restart: unless-stopped
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

networks:
  loanguard-network:
    driver: bridge

volumes:
  # MongoDB persistent data
  mongodb_data:
    driver: local
  # MongoDB persistent config
  mongodb_config:
    driver: local
  # Backend cache for model artifacts
  backend_cache:
    driver: local
